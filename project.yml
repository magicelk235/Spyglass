name: Spyglass
options:
  bundleIdPrefix: com.spyglass
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "V8K8L3ZSD5"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  # Shared, unit-testable logic used by both the app and the extension.
  SpyglassKit:
    type: library.static
    platform: macOS
    sources: [SpyglassKit/Sources]
    settings:
      base:
        DEFINES_MODULE: YES

  # Host application (thin: status UI + future sign-in).
  Spyglass:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: GoogleOAuth.plist
        buildPhase: resources
      - path: AppIcon.icon
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spyglass.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
    dependencies:
      - target: SpyglassKit
      - target: SpyglassPreview
        embed: true

  # Quick Look Preview Extension (.appex embedded in the app).
  SpyglassPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: Preview
      - path: GoogleOAuth.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spyglass.app.preview
        INFOPLIST_FILE: Preview/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Preview/Preview.entitlements
    dependencies:
      - target: SpyglassKit

  # Unit tests for the pure logic in SpyglassKit.
  SpyglassKitTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # Tests need no entitlements; ad-hoc keeps them runnable without a cert.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - target: SpyglassKit

schemes:
  Spyglass:
    build:
      targets:
        Spyglass: all
    run:
      config: Debug
  SpyglassKit:
    build:
      targets:
        SpyglassKit: all
        SpyglassKitTests: [test]
    test:
      targets:
        - SpyglassKitTests
